<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Magers Campaign — Chronicle log for players.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Magers Campaign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Arcane Night theme ── */
  --ink:#f0e8d0;
  --ink-inv:#0f1020;
  --parchment:#0f1020;
  --parchment-dark:#13152b;
  --parchment-mid:#1e2040;
  --card-bg:#181a35;

  --amber:#d4af37;
  --amber-dim:#a88820;
  --amber-light:#f0d060;

  --rust:#ff6b50;
  --teal:#4a9e7a;
  --green:#4adf9a;
  --purple:#c090ff;

  --muted:#7d7a94;
  --muted-light:#4a4870;

  --border:rgba(212,175,55,0.12);
  --border-strong:rgba(212,175,55,0.28);

  --shadow:0 4px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.08);
  --shadow-md:0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.12);

  /* Entity dot colours — brightened for dark bg */
  --c-pc:#4adf9a; --c-npc:#ff8c55; --c-loc:#5ab0ff; --c-quest:#ffd040;
  --c-item:#c090ff; --c-combat:#ff6060; --c-lore:#80ff80; --c-session:#9090c0;

  /* Combat log colours */
  --c-hit:#4adf9a; --c-miss:#ff6060; --c-crit:#ffd040; --c-save:#5ab0ff;
  --c-enemy:#ff8c55; --c-death:#7d7a94; --c-stable:#9090c0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:#0f1020;color:#f0e8d0;height:100vh;overflow:hidden;display:flex;flex-direction:column;background-image:radial-gradient(ellipse at 20% 20%,rgba(74,59,140,0.25) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(30,20,80,0.4) 0%,transparent 55%);}

/* ── Header ── */
header{border-bottom:1px solid var(--border-strong);padding:0 1.5rem;display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;height:64px;background:rgba(13,15,40,0.95);position:relative;z-index:100;}
.logo{font-family:"Cinzel",serif;font-size:1.05rem;font-weight:600;letter-spacing:0.12em;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logo span{color:var(--amber);}
.header-right{display:flex;justify-content:flex-end;align-items:center;gap:0.75rem;overflow:hidden;min-width:0;}
.nav-links{display:flex;gap:0.9rem;justify-content:center;align-items:center;flex-wrap:nowrap;padding:0 2rem;}
.nav-link{cursor:pointer;font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;padding-bottom:2px;border-bottom:1px solid transparent;transition:all 0.15s;white-space:nowrap;cursor:pointer;}
.nav-link:hover{color:var(--ink);}
.nav-link.active{color:var(--amber);border-bottom-color:var(--amber);}

/* ── View toggle ── */
.view-toggle{display:flex;gap:0;border:1px solid var(--border-strong);border-radius:3px;overflow:hidden;}
.view-btn{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;padding:5px 14px;border:none;background:none;cursor:pointer;color:var(--muted);transition:all 0.15s;}
.view-btn.active{background:var(--ink);color:var(--parchment);}

/* ── App shell ── */
.shell{display:flex;flex:1;overflow:hidden;align-items:stretch;min-height:0;}

/* ── Left sidebar ── */
aside{width:260px;flex-shrink:0;border-right:1px solid var(--border-strong);display:flex;flex-direction:column;background:#13152b;overflow:hidden;min-height:0;height:100%;}

/* Search */
.search-wrap{padding:0.85rem 1rem;border-bottom:1px solid var(--border);}
.search-box{position:relative;}
.search-box input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border-strong);border-radius:3px;font-family:'Crimson Pro',serif;font-size:0.92rem;background:var(--parchment-mid);color:var(--ink);outline:none;transition:border-color 0.15s;}
.search-box input:focus{border-color:var(--amber);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:0.35;pointer-events:none;}
.search-results-count{font-size:0.75rem;color:var(--muted);font-style:italic;margin-top:5px;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;}

/* Category filter pills */
.cat-pills{display:flex;flex-wrap:wrap;gap:4px;padding:0.6rem 1rem;border-bottom:1px solid var(--border);}
.cat-pill{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;padding:3px 9px;border-radius:2px;cursor:pointer;border:1px solid;transition:all 0.15s;text-transform:uppercase;}
.cat-pill.active{color:white!important;}

/* Entity list */
.entity-list{flex:1;overflow-y:auto;min-height:0;}
.entity-group-header{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.2em;color:#8886b0;text-transform:uppercase;padding:0.6rem 1rem 0.25rem;background:#1e2248;border-bottom:1px solid rgba(212,175,55,0.18);position:sticky;top:0;z-index:1;}
.entity-item{padding:0.55rem 1rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.12s;display:flex;align-items:center;gap:8px;}
.entity-item:hover{background:rgba(212,175,55,0.07);}
.entity-item.active{background:rgba(212,175,55,0.14);border-right:2px solid var(--amber);}
.entity-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.entity-name{font-size:0.92rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.entity-tag{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:#6b6890;}
.entity-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── Main area: two views ── */
.main-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* BROWSE VIEW */
.browse-view{flex:1;overflow-y:auto;padding:1.5rem;display:none;}
.browse-view.active{display:block;}

/* Entity detail card */
.detail-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:1.5rem;box-shadow:var(--shadow);max-width:820px;}
.detail-header{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.detail-type-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.detail-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;letter-spacing:0.06em;}
.detail-subtitle{font-size:0.9rem;color:var(--muted);font-style:italic;margin-top:3px;}
.detail-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:0.5rem;}
.detail-badge{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.1em;padding:3px 10px;border-radius:2px;border:1px solid;}

.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;}
.detail-section{display:flex;flex-direction:column;gap:0.5rem;}
.detail-section.full{grid-column:1/-1;}
.section-label{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-bottom:0.25rem;padding-bottom:3px;border-bottom:1px solid var(--border);}
.section-text{font-size:0.95rem;line-height:1.65;color:var(--ink);}

/* Relationship chips */
.rel-chips{display:flex;flex-wrap:wrap;gap:6px;}
.rel-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:var(--parchment);transition:all 0.15s;font-size:0.85rem;}
.rel-chip:hover{border-color:var(--amber);background:rgba(212,175,55,0.06);}
.rel-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.rel-chip-label{color:var(--muted);font-size:0.72rem;font-family:'Cinzel',serif;letter-spacing:0.06em;}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0;}
.timeline-item{display:flex;gap:10px;padding:6px 0;}
.timeline-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-top:5px;}
.timeline-session{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted-light);flex-shrink:0;min-width:80px;}
.timeline-text{font-size:0.9rem;color:var(--ink);}

/* Progress bar for quests */
.quest-progress{margin-top:4px;}
.obj-row{display:flex;align-items:center;gap:8px;font-size:0.88rem;padding:4px 0;}
.obj-check{width:14px;height:14px;border-radius:2px;border:1.5px solid var(--border-strong);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.obj-check.done{background:var(--teal);border-color:var(--teal);}

/* Search results list */
.search-results{display:flex;flex-direction:column;gap:8px;}
.search-result-card{background:white;border:1px solid var(--border);border-radius:3px;padding:0.85rem 1rem;cursor:pointer;transition:all 0.15s;}
.search-result-card:hover{border-color:var(--amber);box-shadow:var(--shadow);}
.sr-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.sr-title{font-size:1rem;font-weight:600;}
.sr-snippet{font-size:0.88rem;color:var(--muted);font-style:italic;line-height:1.4;}
mark{background:rgba(212,175,55,0.2);color:var(--ink);border-radius:2px;padding:0 2px;}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);gap:0.5rem;}
.empty-state-title{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:0.08em;}

/* GRAPH VIEW */
.graph-view{flex:1;overflow:hidden;display:none;flex-direction:column;}
.graph-view.active{display:flex;}
.graph-canvas{flex:1;position:relative;background:var(--parchment);}
#graph-svg{width:100%;height:100%;}

.graph-toolbar{padding:0.6rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(15,16,40,0.95);}
.graph-legend{display:flex;flex-wrap:wrap;gap:10px;flex:1;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.75rem;color:var(--muted);}
.legend-dot{width:9px;height:9px;border-radius:50%;}

/* Graph tooltip */
.graph-tooltip{position:absolute;background:var(--ink);color:var(--parchment);padding:6px 12px;border-radius:3px;font-size:0.8rem;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:100;white-space:nowrap;font-family:'Cinzel',serif;letter-spacing:0.06em;}

/* Graph node panel (on click) */
.graph-node-panel{position:absolute;right:1rem;top:1rem;width:260px;background:#181a35;border:1px solid var(--border-strong);border-radius:4px;padding:1rem;box-shadow:var(--shadow-md);display:none;}
.graph-node-panel.visible{display:block;}
.gnp-title{font-family:'Cinzel',serif;font-size:0.9rem;font-weight:600;margin-bottom:0.25rem;}
.gnp-type{font-size:0.75rem;color:var(--muted);font-style:italic;margin-bottom:0.75rem;}
.gnp-rels{display:flex;flex-direction:column;gap:4px;}
.gnp-rel{font-size:0.82rem;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0;}
.gnp-rel:hover .gnp-rel-name{color:var(--amber);}
.gnp-rel-name{color:var(--ink);}
.gnp-btn{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.08em;padding:5px 12px;border-radius:2px;border:1px solid var(--border-strong);background:none;cursor:pointer;margin-top:0.75rem;width:100%;transition:all 0.15s;}
.gnp-btn:hover{background:var(--amber);color:white;border-color:var(--amber);}

/* Session timeline panel */
.session-timeline{border-bottom:1px solid var(--border);background:#111226;padding:0.6rem 1.5rem;display:flex;gap:1rem;align-items:center;flex-shrink:0;overflow-x:auto;}
.session-pill{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;padding:4px 12px;border-radius:2px;border:1px solid var(--border-strong);cursor:pointer;white-space:nowrap;background:none;color:var(--muted);transition:all 0.15s;}
.session-pill:hover{border-color:var(--amber);color:var(--amber-dim);}
.session-pill.active{background:var(--ink);color:var(--parchment);border-color:var(--ink);}
.session-pill-label{display:block;font-size:0.55rem;opacity:0.6;margin-top:1px;}

.btn{font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.1em;padding:6px 14px;border-radius:3px;cursor:pointer;border:1px solid var(--border-strong);background:none;color:var(--muted);transition:all 0.15s;}
.btn:hover{background:var(--parchment-dark);}
.btn-amber{border-color:var(--amber);color:var(--amber-dim);}
.btn-amber:hover{background:var(--amber);color:white;}

/* ── Session view styles ── */
.session-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:1.5rem;box-shadow:var(--shadow);max-width:820px;}
.session-vibe{font-style:italic;color:var(--muted);border-left:3px solid var(--amber);padding:0.6rem 0.85rem;margin:0.75rem 0;font-size:0.95rem;background:rgba(212,175,55,0.04);border-radius:0 3px 3px 0;}
.session-moments{display:flex;flex-direction:column;gap:8px;margin-top:0.5rem;}
.moment-card{background:var(--parchment-mid);border:1px solid var(--border);border-radius:3px;padding:0.7rem 0.9rem;}
.moment-type{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.14em;color:var(--amber-dim);text-transform:uppercase;margin-bottom:3px;}
.moment-desc{font-size:0.9rem;line-height:1.55;}
.moment-pcs{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;}
.moment-pc-chip{font-family:'JetBrains Mono',monospace;font-size:0.65rem;background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.25);color:#0F6E56;padding:1px 7px;border-radius:10px;}
.combat-stub{border:1px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;transition:all 0.15s;}
.combat-stub:hover{border-color:var(--amber);box-shadow:var(--shadow);}
.combat-stub-header{display:flex;align-items:center;gap:10px;padding:0.7rem 1rem;background:var(--parchment-mid);}
.combat-stub-name{font-family:'Cinzel',serif;font-size:0.85rem;font-weight:600;letter-spacing:0.06em;flex:1;}
.combat-stub-rounds{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--muted-light);}
.combat-stub-badge{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;padding:2px 8px;border-radius:2px;}
.combat-stub-body{padding:0.6rem 1rem;font-size:0.85rem;color:var(--muted);font-style:italic;}
.session-span-notice{background:rgba(181,212,244,0.2);border:1px solid rgba(55,138,221,0.25);border-radius:3px;padding:5px 10px;font-size:0.8rem;color:#185FA5;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;}

/* ── Combat log styles ── */
.combat-log-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;padding:1.5rem;box-shadow:var(--shadow);max-width:900px;}
.combat-session-strip{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
.combat-session-chip{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.1em;padding:3px 10px;border-radius:2px;border:1px solid var(--border-strong);cursor:pointer;color:var(--muted);background:none;transition:all 0.15s;}
.combat-session-chip:hover,.combat-session-chip.active{background:var(--ink);color:var(--parchment);border-color:var(--ink);}
.round-block{border:1px solid var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden;}
.round-header{display:flex;align-items:center;gap:10px;padding:0.55rem 1rem;background:var(--parchment-mid);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.round-num{font-family:'Cinzel',serif;font-size:0.78rem;font-weight:600;letter-spacing:0.1em;color:var(--ink);}
.round-session-tag{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted-light);}
.round-summary-chips{display:flex;gap:4px;flex:1;flex-wrap:wrap;}
.round-summary-chip{font-size:0.68rem;padding:1px 6px;border-radius:10px;border:1px solid;}
.chip-hit{background:rgba(29,158,117,0.1);color:#0F6E56;border-color:rgba(29,158,117,0.25);}
.chip-miss{background:rgba(163,45,45,0.07);color:#791F1F;border-color:rgba(163,45,45,0.2);}
.chip-crit{background:rgba(186,117,23,0.12);color:#633806;border-color:rgba(186,117,23,0.3);}
.chip-death{background:rgba(90,90,80,0.1);color:#444441;border-color:rgba(90,90,80,0.2);}
.chip-enemy{background:rgba(216,90,48,0.08);color:#712B13;border-color:rgba(216,90,48,0.2);}
.round-toggle{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--muted-light);}
.round-body{display:none;}
.round-body.open{display:block;}
.initiative-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.slot-row{display:flex;align-items:flex-start;gap:8px;padding:0.45rem 1rem;border-bottom:1px solid var(--border);font-size:0.88rem;}
.slot-row:last-child{border-bottom:none;}
.slot-row.odd{background:rgba(19,21,43,0.8);}
.slot-row.left-col{border-right:1px solid var(--border);}
.slot-num-badge{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--muted-light);min-width:14px;flex-shrink:0;margin-top:2px;}
.slot-actor{font-family:'Cinzel',serif;font-size:0.72rem;font-weight:600;color:var(--ink);min-width:42px;flex-shrink:0;letter-spacing:0.04em;}
.slot-action{flex:1;color:var(--ink);}
.slot-result{font-family:'JetBrains Mono',monospace;font-size:0.68rem;flex-shrink:0;padding:1px 6px;border-radius:2px;}
.result-hit{background:rgba(29,158,117,0.1);color:#0F6E56;}
.result-miss{background:rgba(163,45,45,0.07);color:#791F1F;}
.result-crit{background:rgba(186,117,23,0.12);color:#633806;}
.result-death{background:rgba(90,90,80,0.1);color:#444441;}
.result-save{background:rgba(55,138,221,0.1);color:#185FA5;}
.result-neutral{background:var(--parchment-mid);color:var(--muted);}
.slot-value{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--amber-dim);font-weight:500;margin-left:4px;}
.slot-notes{font-size:0.78rem;color:var(--muted);font-style:italic;margin-top:2px;}
.enemy-row{grid-column:1/-1;background:rgba(216,90,48,0.04);border-top:1px solid rgba(216,90,48,0.15);}
.enemy-row .slot-actor{color:var(--rust);}
.combat-outcome-banner{display:flex;align-items:center;gap:10px;padding:0.7rem 1rem;border-radius:3px;margin-bottom:1rem;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.1em;}
.outcome-victory{background:rgba(29,158,117,0.08);border:1px solid rgba(29,158,117,0.25);color:#0F6E56;}
.outcome-paused{background:rgba(186,117,23,0.08);border:1px solid rgba(186,117,23,0.25);color:#633806;}
.spans-sessions-badge{background:rgba(55,138,221,0.1);border:1px solid rgba(55,138,221,0.25);color:#185FA5;font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;padding:2px 8px;border-radius:2px;}
.combat-stat-row{display:flex;gap:1.5rem;margin-bottom:1rem;flex-wrap:wrap;}
.combat-stat{text-align:center;padding:0.6rem 1rem;background:var(--parchment-mid);border-radius:3px;border:1px solid var(--border);}
.combat-stat-num{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:600;color:var(--ink);}
.combat-stat-label{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-top:2px;}

/* ── Copyable error alert bar ── */
#error-alert{
  display:none;position:fixed;top:58px;left:0;right:0;z-index:200;
  background:#1a0a08;border-bottom:2px solid var(--rust);
  padding:0.65rem 1.25rem;
  display:none;align-items:flex-start;gap:12px;
}
#error-alert.visible{display:flex;}
.ea-icon{color:var(--rust);font-size:1.1rem;flex-shrink:0;margin-top:1px;}
.ea-body{flex:1;}
.ea-title{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.1em;color:var(--rust);margin-bottom:3px;}
.ea-msg{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:#ffb8a8;line-height:1.6;
  background:rgba(255,107,80,0.06);border:1px solid rgba(255,107,80,0.2);border-radius:3px;
  padding:6px 10px;margin-top:4px;white-space:pre-wrap;word-break:break-all;cursor:text;
  user-select:all;}
.ea-actions{display:flex;gap:6px;margin-top:6px;}
.ea-copy{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;padding:4px 10px;
  border-radius:2px;border:1px solid rgba(255,107,80,0.4);background:none;color:var(--rust);
  cursor:pointer;transition:all 0.15s;}

function ingestDriveData(json, fileId) {
  const diag = msg => { setStatus(msg, 'loading'); };
  try {
    diag('Normalising campaign JSON...');
    DATA = normaliseCampaignJson(json);

    CONFIG.lastLoaded = new Date().toLocaleString();
    localStorage.setItem('chronicle_last_loaded', CONFIG.lastLoaded);

    diag('Clearing ENTITIES...');
    Object.keys(ENTITIES).forEach(k => delete ENTITIES[k]);

    diag('registerAll...');
    registerAll();

    diag('renderSessionTimeline...');
    renderSessionTimeline();

    diag('renderSidebar...');
    renderSidebar();

    setStatus('Loaded \u00b7 ' + (DATA.sessions?.length||0) + ' sessions \u00b7 ' + (DATA.party?.length||0) + ' PCs \u00b7 ' + (DATA.combats?.length||0) + ' combats', 'ok');
    const settingsStatus = document.getElementById('settings-status');
    if (settingsStatus) settingsStatus.textContent = 'Campaign log loaded: ' + (DATA.sessions?.length||0) + ' sessions, ' + (DATA.party?.length||0) + ' PCs, ' + (DATA.npcs?.length||0) + ' NPCs.';
    // Update the sync bar with the Drive data's last_updated date
    const driveDate = json.meta?.last_updated || json._last_published || null;
  } catch(e) {
    const msg = 'ingestDriveData failed: ' + e.message;
    console.error('[ingest] CRASH', e);
    setStatus(msg, 'error');
    console.error('[player] ingestDriveData error:', e);
  }
}

function normaliseCampaignJson(json) {
  // Fast path: data is already in viewer shape. Handles any future pre-normalised format.
  if (json.sessions && json.combats) return json;

  // v4 campaign format (schema 4.0.0): root keys are combat_encounters and party.
  // v4 moves flat fields into mechanics/narrative sub-objects on every entity type.
  if (json.combat_encounters && json.party) {

    // Flatten a v4 slot to the compact shape the renderer expects.
    // v4 slot: {s, a, action:{name, res, val, ...}, notes}
    // viewer:  {s, a, act, res, val, notes}
    function flattenSlot(slot) {
      return {
        s:     slot.s,
        a:     slot.a,
        act:   slot.action?.name  ?? '—',    // v4: slot.action.name  (was top-level slot.act)
        res:   slot.action?.res   ?? null,    // v4: slot.action.res   (was top-level slot.res)
        val:   slot.action?.val   ?? null,    // v4: slot.action.val   (was top-level slot.val)
        notes: slot.notes || slot.action?.notes || null,
      };
    }

    // Map a v4 enemy_turn entry to the {desc, impact} shape the combat renderer uses.
    // v4 enemy_turn: {actor_id, action:{name, res, val}, special_events:[{type, description}]}
    function flattenEnemyTurn(et) {
      const act = et.action;
      let desc = et.actor_id || '?';
      if (act?.name) {
        desc += ': ' + act.name;
        if (act.res) desc += ' (' + act.res + (act.val != null ? ', ' + act.val : '') + ')';
      }
      // special_events carry narrative impacts like downed/killed markers
      const impact = (et.special_events || []).map(ev => ev.description).filter(Boolean).join('; ') || null;
      return { desc, impact };
    }

    return {
      // ── Sessions ──────────────────────────────────────────────────────────────
      // v4: id/date promoted to root; summary/tone moved into narrative sub-object;
      //     key_moments are now objects {description, type, ref} — flatten to strings for viewer
      sessions: (json.session_logs || []).map(s => ({
        id:             s.id,                                        // v4: s.id            (was s.session_id)
        title:          s.title,
        date:           s.date,                                      // v4: s.date           (was s.session_date)
        summary:        s.narrative?.summary       ?? null,          // v4: s.narrative.summary (was s.summary)
        narrative_vibe: s.narrative?.tone          ?? null,          // v4: s.narrative.tone    (was s.narrative_vibe)
        key_moments:    (s.narrative?.key_moments  ?? []).map(
                          km => typeof km === 'string' ? km : (km.description ?? '')
                        ),                                           // v4: objects → flatten to strings for renderSessionDetail
        mechanical_notes: s.mechanical_notes || [],
      })),

      // ── Party ─────────────────────────────────────────────────────────────────
      // v4: class/level moved into mechanics; free-text notes renamed campaign_notes; milestones at root
      party: (json.party || []).map(p => ({
        id:         p.id,
        name:       p.name,
        nickname:   p.nickname,
        player:     p.player,
        cls:        p.mechanics?.class ?? null,    // v4: p.mechanics.class (was p.class)
        level:      p.mechanics?.level ?? null,    // v4: p.mechanics.level (was p.current_level)
        notes:      p.campaign_notes   ?? null,    // v4: p.campaign_notes  (was p.notes)
        milestones: p.milestones       || [],      // v4: p.milestones still at root
      })),

      // ── NPCs ──────────────────────────────────────────────────────────────────
      // v4: disposition inside mechanics; description inside narrative; spread retains all other fields
      npcs: (json.npc_directory || []).map(n => ({
        ...n,
        disposition: n.mechanics?.disposition ?? null,  // v4: n.mechanics.disposition (was n.disposition)
        description: n.narrative?.description ?? null,  // v4: n.narrative.description (was n.description)
      })),

      // ── Locations ─────────────────────────────────────────────────────────────
      // v4: visibility inside mechanics; description inside narrative
      locations: (json.locations || []).map(l => ({
        ...l,
        visibility:  l.mechanics?.visibility  ?? null,  // v4: l.mechanics.visibility  (was l.visibility)
        description: l.narrative?.description ?? null,  // v4: l.narrative.description (was l.description)
      })),

      // ── Quests ────────────────────────────────────────────────────────────────
      // v4: all mechanic fields inside q.mechanics; motivation inside q.narrative;
      //     progress_log text renamed .entry → .fact; objectives renamed description→desc, is_completed→done
      quests: (json.quest_ledger || []).map(q => ({
        id:         q.id,
        title:      q.title,
        status:     q.mechanics?.status    ?? null,   // v4: q.mechanics.status    (was q.status)
        priority:   q.mechanics?.priority  ?? null,   // v4: q.mechanics.priority  (was q.priority)
        category:   q.mechanics?.category  ?? null,   // v4: q.mechanics.category  (was q.category)
        motivation: q.narrative?.motivation ?? null,  // v4: q.narrative.motivation (was q.narrative_motivation)
        // v4 objectives: {id, description, is_completed} → viewer uses {desc, done}
        objectives: (q.mechanics?.objectives || []).map(o => ({
          desc:  o.description  ?? '',     // v4: o.description  (was o.desc)
          done:  o.is_completed ?? false,  // v4: o.is_completed (was o.done)
          notes: o.notes        ?? null,
        })),
        // v4 progress_log: entry text renamed .entry → .fact; viewer accesses p.s and p.e
        progress: (q.mechanics?.progress_log || []).map(p => ({
          s: p.session_id,
          e: p.fact ?? p.entry ?? '',     // v4: p.fact (was p.entry); fallback keeps older data readable
        })),
        origin: q.mechanics?.origin_session ?? null,  // v4: q.mechanics.origin_session (was q.origin_session)
      })),

      // ── Items ─────────────────────────────────────────────────────────────────
      // v4: item_type/current_holder/found_session/is_quest_relevant inside mechanics;
      //     description inside narrative
      items: (json.inventory_and_loot || []).map(i => ({
        id:      i.id,
        name:    i.name,
        type:    i.mechanics?.item_type       ?? null,   // v4: i.mechanics.item_type      (was i.type)
        session: i.mechanics?.found_session   ?? null,   // v4: i.mechanics.found_session  (was i.session_found)
        holder:  i.mechanics?.current_holder  ?? null,   // v4: i.mechanics.current_holder (was i.current_holder_id)
        notes:   (i.notes || '') + (i.narrative?.description ? ' ' + i.narrative.description : ''),
        quest:   i.mechanics?.is_quest_relevant ?? false, // v4: i.mechanics.is_quest_relevant (was i.is_quest_item)
      })),

      // ── Combats ───────────────────────────────────────────────────────────────
      // v4: outcome/location/sessions/total_rounds_logged inside mechanics;
      //     setup/finale/aftermath inside narrative; slots have nested action object;
      //     enemy array renamed enemy_turns with richer structure
      combats: (json.combat_encounters || []).map(c => ({
        ...c,
        // Flat fields the sidebar and detail renderer look up directly
        outcome:          c.mechanics?.outcome             ?? null,  // v4: c.mechanics.outcome
        location:         c.mechanics?.location            ?? null,  // v4: c.mechanics.location (was c.location_id)
        sessions:         c.mechanics?.sessions            ?? [],    // v4: c.mechanics.sessions
        totalRounds:      c.mechanics?.total_rounds_logged ?? null,  // v4: c.mechanics.total_rounds_logged
        // Narrative prose the combat detail panel renders
        narrativeContext: c.narrative?.setup               ?? null,  // v4: c.narrative.setup    (was c.narrativeContext)
        finale:           c.narrative?.finale              ?? null,  // v4: c.narrative.finale
        aftermath:        c.narrative?.aftermath           ?? null,  // v4: c.narrative.aftermath
        // Remap rounds: flatten slots and convert enemy_turns → enemy[]
        rounds: (c.rounds || []).map(round => ({
          ...round,
          slots: (round.slots || []).map(flattenSlot),
          enemy: (round.enemy_turns || round.enemy || []).map(flattenEnemyTurn), // v4: round.enemy_turns (was round.enemy)
        })),
      })),

      // ── Lore ──────────────────────────────────────────────────────────────────
      // v4: content inside narrative; reliability inside mechanics; title unchanged
      lore: (json.world_lore || []).map(l => ({
        ...l,
        content:     l.narrative?.content     ?? null,  // v4: l.narrative.content (was l.content)
        reliability: l.mechanics?.reliability ?? null,  // v4: l.mechanics.reliability
      })),

      // ── Bestiary ──────────────────────────────────────────────────────────────
      // v4: reliability/first_encountered/combat_appearances inside mechanics;
      //     no flat traits[] — observed_abilities is an array of objects inside mechanics
      bestiary: (json.bestiary || []).map(b => ({
        ...b,
        reliability:        b.mechanics?.reliability        ?? null,  // v4: b.mechanics.reliability
        first_encountered:  b.mechanics?.first_encountered  ?? null,  // v4: b.mechanics.first_encountered
        combat_appearances: b.mechanics?.combat_appearances ?? [],    // v4: b.mechanics.combat_appearances
      })),

      // ── Character moments ─────────────────────────────────────────────────────
      // v4: character_ids/parent_event_id/origin_session inside mechanics; description inside narrative
      moments: (json.character_moments || []).map(m => ({
        character_ids:   m.mechanics?.character_ids   ?? [],    // v4: m.mechanics.character_ids   (was m.character_ids)
        type:            m.type,
        description:     m.narrative?.description     ?? null,  // v4: m.narrative.description     (was m.description)
        parent_event_id: m.mechanics?.parent_event_id ?? null,  // v4: m.mechanics.parent_event_id (was m.parent_event_id)
        origin_session:  m.mechanics?.origin_session  ?? null,  // v4: m.mechanics.origin_session  (was m.origin_session)
      })),
    };
  }

  // Unrecognised format — include schema version in error if present
  const v = json._schema_version;
  throw new Error('normaliseCampaignJson: unrecognised JSON format' + (v ? ' (schema v' + v + ')' : ''));
}

function setStatus(msg, type) {
  if (type === 'error') {
    console.warn('[Chronicle]', msg);
  }
  const el = document.getElementById('data-status');
  if (!el) return;
  const colours = { ok:'var(--teal)', error:'var(--rust)', loading:'var(--amber-dim)' };
  const dots = { ok:'●', error:'✕', loading:'◌' };
  el.innerHTML = `<span style="color:${colours[type]||'var(--muted)'};">${dots[type]||'·'}</span><span style="font-size:0.58rem;">${msg}</span>`;
}

// ══════════════════════════════════════════════════════
// MODE SYSTEM
// ══════════════════════════════════════════════════════
// setMode removed — player version locks to player mode

function applyMode() {
  // Player version — always player mode, admin-only elements always hidden
  document.querySelectorAll('.admin-only').forEach(el => { el.style.display = 'none'; });
}

function registerAll() {
  DATA.sessions.forEach(e=>{ ENTITIES[e.id]={...e,_type:'session',_name:e.title,_search:[e.title,e.summary,e.date].join(' ')}; });
  DATA.party.forEach(e=>{ ENTITIES[e.id]={...e,_type:'pc',_name:e.name,_search:[e.name,e.nickname,e.cls,e.player,e.notes].join(' ')}; });
  DATA.npcs.forEach(e=>{ ENTITIES[e.id]={...e,_type:'npc',_name:e.name,_search:[e.name,e.notes].join(' ')}; });
  DATA.locations.forEach(e=>{ ENTITIES[e.id]={...e,_type:'location',_name:e.name,_search:[e.name,e.description].join(' ')}; });
  DATA.quests.forEach(e=>{ ENTITIES[e.id]={...e,_type:'quest',_name:e.title,_search:[e.title,e.motivation,e.objectives?.map(o=>o.desc).join(' ')].join(' ')}; });
  DATA.items.forEach(e=>{ ENTITIES[e.id]={...e,_type:'item',_name:e.name,_search:[e.name,e.type,e.notes].join(' ')}; });
  DATA.combats.forEach(e=>{ ENTITIES[e.id]={...e,_type:'combat',_name:e.name,_search:[e.name,e.narrativeContext,e.notes].join(' ')}; });
  DATA.lore.forEach(e=>{ ENTITIES[e.id]={...e,_type:'lore',_name:e.title,_search:[e.title,e.content].join(' ')}; });
  DATA.bestiary.forEach(e=>{ ENTITIES[e.id]={...e,_type:'lore',_name:e.name,_search:[e.name,e.traits?.join(' ')].join(' ')}; });
}

let state = { view:'browse', catFilter:'all', search:'', selectedId:null, sessionFilter:null };

// ══════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════
const CAT_ORDER = ['session','combat','pc','npc','location','quest','item','lore'];
const CAT_LABELS = { session:'Sessions', combat:'Combat Encounters', pc:'Player Characters', npc:'NPCs', location:'Locations', quest:'Quests', item:'Items & Loot', lore:'Lore & Bestiary' };
const CAT_SOURCES = { session:()=>DATA.sessions, pc:()=>DATA.party, npc:()=>DATA.npcs, location:()=>DATA.locations, quest:()=>DATA.quests, item:()=>DATA.items, combat:()=>DATA.combats, lore:()=>[...DATA.lore,...DATA.bestiary] };

function renderSidebar() {
  const q = state.search.toLowerCase();
  const list = document.getElementById('entity-list');
  let html = '';
  let total = 0;



  const cats = state.catFilter === 'all' ? CAT_ORDER : [state.catFilter];
  cats.forEach(cat => {
    const items = CAT_SOURCES[cat]().filter(e => {
      const ent = ENTITIES[e.id];
      if (!ent) return false;
      const sessionOk = !state.sessionFilter || matchesSession(e, state.sessionFilter);
      const searchOk = !q || ent._search.toLowerCase().includes(q);
      return sessionOk && searchOk;
    });

    if (!items.length) return;
    total += items.length;
    html += `<div class="entity-group-header">${CAT_LABELS[cat]}</div>`;
    items.forEach(e => {
      try {
      const ent = ENTITIES[e.id];
      const isActive = state.selectedId === e.id;
      const statusDot = ent._type === 'npc' ? `<span class="entity-status-dot" style="background:${e.disposition==='deceased'?'#A32D2D':e.disposition==='friendly'?'#1D9E75':e.disposition==='neutral'?'#BA7517':'#888'}"></span>` : '';
      const tag = ent._type === 'quest' ? `<span class="entity-tag" style="color:${e.status==='completed'?'var(--teal)':e.priority==='critical'?'var(--rust)':'var(--muted)'};">${e.status}</span>` :
                  ent._type === 'location' ? `<span class="entity-tag">${e.visibility||'unknown'}</span>` :
                  ent._type === 'item' ? `<span class="entity-tag">${e.type||'item'}</span>` :
                  ent._type === 'pc' ? `<span class="entity-tag">${e.nickname} · ${e.cls}</span>` :
                  ent._type === 'session' ? `<span class="entity-tag">${e.date}</span>` :
                  ent._type === 'combat' ? `<span class="entity-tag" style="color:${e.outcome==='victory'?'var(--teal)':e.outcome==='paused'?'var(--amber-dim)':'var(--muted)'};">${e.totalRounds}r · ${e.outcome}</span>` : '';
      html += `<div class="entity-item${isActive?' active':''}" onclick="selectEntity('${e.id}')">
        <span class="entity-dot" style="background:${TYPE_HEX[ent._type]};"></span>
        ${statusDot}
        <span class="entity-name">${ent._name}</span>
        ${tag}
      </div>`;
      } catch(sidebarErr) {
        console.error('[sidebar] CRASH on entity', e?.id, e?.name, sidebarErr.message);
        html += `<div class="entity-item" style="color:var(--red);font-size:0.75rem;padding:4px 8px;">⚠ ${e?.id}: ${sidebarErr.message}</div>`;
      }
    });
  });

  list.innerHTML = html || '<div style="padding:1rem;font-size:0.88rem;color:var(--muted-light);font-style:italic;text-align:center;">No results</div>';
  const countEl = document.getElementById('search-count');
  countEl.textContent = q ? `${total} result${total!==1?'s':''} for "${state.search}"` : '';
}

function matchesSession(e, sid) {
  return e.id === sid || e.session === sid || e.origin === sid || e.origin_session === sid ||
    (e.sessions||[]).includes(sid) ||
    (e.progress||[]).some(p=>p.s===sid) ||
    (e.sessions_spanning||[]).includes(sid);
}

function selectEntity(id) {
  state.selectedId = id;
  state.search = '';
  document.getElementById('search-input').value = '';
  renderSidebar();
  renderDetail(id);
  if (state.view === 'graph') focusNode(id);
}

function getName(id) { return ENTITIES[id]?._name || id; }
function getType(id) { return ENTITIES[id]?._type || 'unknown'; }

function resultClass(res) {
  if (!res) return 'result-neutral';
  const r = res.toLowerCase();
  if (r==='crit'||r==='critical-hit') return 'result-crit';
  if (r==='miss'||r==='unclear') return 'result-miss';
  if (r==='death') return 'result-death';
  if (r==='save'||r==='enemy-save') return 'result-save';
  if (r==='hit') return 'result-hit';
  return 'result-neutral';
}
function resultLabel(res) {
  if (!res||res==='neutral') return '';
  if (res==='crit'||res==='critical-hit') return 'CRIT';
  if (res==='enemy-save') return 'save';
  if (res==='death') return 'death sv';
  if (res==='unclear') return '?';
  return res;
}
function roundSummaryChips(round) {
  const crits = round.slots.filter(s=>s.res==='crit'||s.res==='critical-hit').length;
  const misses = round.slots.filter(s=>s.res==='miss').length;
  const hits = round.slots.filter(s=>s.res==='hit').length;
  const deaths = round.slots.filter(s=>s.res==='death').length;
  let chips = '';
  if (crits) chips += `<span class="round-summary-chip chip-crit">${crits} crit</span>`;
  if (hits) chips += `<span class="round-summary-chip chip-hit">${hits} hit</span>`;
  if (misses) chips += `<span class="round-summary-chip chip-miss">${misses} miss</span>`;
  if (deaths) chips += `<span class="round-summary-chip chip-death">${deaths} death sv</span>`;
  if (round.enemy?.length) chips += `<span class="round-summary-chip chip-enemy">enemy action</span>`;
  return chips;
}

}

function renderRoundBlock(round, cbtId) {
  const isOpen = openRounds.has(`${cbtId}-${round.n}`);
  const summaryChips = roundSummaryChips(round);

  // Arrange slots in grid: left col (1-3), right col (4-6)
  const leftSlots = round.slots.filter(s=>s.s<=3);
  const rightSlots = round.slots.filter(s=>s.s>=4);
  const maxRows = Math.max(leftSlots.length, rightSlots.length);

  let gridRows = '';
  for (let i=0; i<maxRows; i++) {
    const L = leftSlots[i];
    const R = rightSlots[i];
    gridRows += `
      <div class="slot-row left-col${i%2===0?' odd':''}">
        ${L ? slotHTML(L) : '<div style="flex:1;"></div>'}
      </div>
      <div class="slot-row${i%2===0?' odd':''}">
        ${R ? slotHTML(R) : '<div style="flex:1;"></div>'}
      </div>`;
  }

  const enemyRows = (round.enemy||[]).map(e=>`
    <div class="slot-row enemy-row" style="grid-column:1/-1;padding:0.45rem 1rem;">
      <span class="slot-actor" style="color:var(--rust);">Enemy</span>
      <span class="slot-action" style="flex:1;">${e.desc}</span>
      ${e.impact?`<span style="font-size:0.78rem;color:var(--rust);font-style:italic;">${e.impact}</span>`:''}
    </div>`).join('');

  const roundSummaryBlock = round.summary
    ? `<div style="display:flex;align-items:flex-start;gap:8px;padding:0.6rem 0.85rem;background:rgba(212,175,55,0.06);border-top:1px solid rgba(212,175,55,0.12);font-size:0.9rem;color:var(--ink);">
        <span style="font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.12em;color:var(--amber);text-transform:uppercase;flex-shrink:0;margin-top:2px;padding-right:8px;border-right:1px solid rgba(212,175,55,0.2);margin-right:4px;">Summary</span>
        <span style="font-style:italic;line-height:1.55;">${round.summary}</span>
      </div>` : '';

  return `
    <div class="round-block" id="round-${cbtId}-${round.n}">
      <div class="round-header" onclick="toggleRound('${cbtId}',${round.n})">
        <span class="round-num">Round ${round.n}</span>
        <span class="round-session-tag">${round.sid}</span>
        <div class="round-summary-chips">${summaryChips}</div>
        <span class="round-toggle">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="round-body${isOpen?' open':''}" id="round-body-${cbtId}-${round.n}">
        <div class="initiative-grid">
          ${gridRows}
          ${enemyRows}
        </div>
        ${roundSummaryBlock}
      </div>
    </div>`;
}

function slotHTML(slot) {
  const pc = PARTY_LOOKUP[slot.a] || {nick:slot.a,cls:''};
  const rClass = resultClass(slot.res);
  const rLabel = resultLabel(slot.res);
  return `
    <span class="slot-num-badge">${slot.s}</span>
    <span class="slot-actor" style="cursor:pointer;" onclick="event.stopPropagation();selectEntity('${slot.a}')">${pc.nick}</span>
    <div class="slot-action">
      <div>${slot.act}${slot.val?`<span class="slot-value">${slot.val}</span>`:''}</div>
      ${slot.notes?`<div class="slot-notes">${slot.notes}</div>`:''}
    </div>
    ${rLabel?`<span class="slot-result ${rClass}">${rLabel}</span>`:''}`;
}

function toggleRound(cbtId, n) {
  const key = `${cbtId}-${n}`;
  if (openRounds.has(key)) openRounds.delete(key);
  else openRounds.add(key);
  const body = document.getElementById(`round-body-${cbtId}-${n}`);
  const toggle = document.querySelector(`#round-${cbtId}-${n} .round-toggle`);
  if (body) body.classList.toggle('open', openRounds.has(key));
  if (toggle) toggle.textContent = openRounds.has(key)?'▲':'▼';
}

function setCombatSessionFilter(sid, cbtId) {
  combatSessionFilter = sid;
  const cbt = ENTITIES[cbtId];
  if (cbt) renderCombatDetail(cbt);
}

function renderDetail(id) {
  const ent = ENTITIES[id];
  if (!ent) return;
  if (ent._type === 'session') { renderSessionDetail(ent); return; }
  if (ent._type === 'combat') { openRounds.clear(); combatSessionFilter = null; renderCombatDetail(ent); return; }
  const colour = TYPE_HEX[ent._type];
  const bc = document.getElementById('browse-content');

  // Build related-entity chips: find entities that share sessions/location/quest with this one
  const rels = (() => {
    const seen = new Set();
    const results = [];
    const addRel = (relId) => {
      if (relId && relId !== id && !seen.has(relId) && ENTITIES[relId]) {
        seen.add(relId);
        results.push(ENTITIES[relId]);
      }
    };
    // Find combats that reference this entity
    (DATA.combats||[]).forEach(cbt => {
      if (ent._type === 'location' && cbt.location === id) {
        (cbt.sessions||[]).forEach(sid => addRel(sid));
      }
    });
    // Find sessions this entity appears in
    const entitySessions = new Set();
    (DATA.combats||[]).forEach(cbt => {
      if (cbt.location === id) (cbt.sessions||[]).forEach(s => entitySessions.add(s));
    });
    if (ent._type === 'npc' || ent._type === 'pc') {
      (DATA.moments||[]).filter(m => m.character_ids?.includes(id))
        .forEach(m => addRel(m.parent_event_id));

    if (ent._type === 'item' && ent.holder) addRel(ent.holder);
    if (ent._type === 'quest') {

function handleSearch(val) {
  state.search = val;
  state.selectedId = null;
  renderSidebar();

  if (!val.trim()) {
    document.getElementById('browse-content').innerHTML = '<div class="empty-state" style="height:400px;"><div class="empty-state-title">Select an entry from the left</div></div>';
    return;
  }
  const q = val.toLowerCase();
  const results = Object.values(ENTITIES).filter(e => e._search.toLowerCase().includes(q));

  function highlight(str) {
    if (!str) return '';
    return str.replace(new RegExp(`(${val.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
  }

  const bc = document.getElementById('browse-content');
  if (!results.length) { bc.innerHTML = '<div class="empty-state" style="height:300px;"><div class="empty-state-title">No results found</div></div>'; return; }
  bc.innerHTML = `<div class="search-results">${results.map(e=>`
    <div class="search-result-card" onclick="selectEntity('${e.id}')">
      <div class="sr-header">
        <span class="entity-dot" style="background:${TYPE_HEX[e._type]};width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block;"></span>
        <span class="sr-title">${highlight(e._name)}</span>
        <span class="entity-tag" style="margin-left:auto;">${e._type}</span>
      </div>
      <div class="sr-snippet">${highlight(e._search.substring(0,180))}…</div>
    </div>`).join('')}</div>`;
}

  state.catFilter = cat;

    p.classList.remove('active');
    p.style.background = 'none';
    p.style.color = '';

// VIEW SWITCHING
// ══════════════════════════════════════════════════════
function switchView(which, btn) {
  state.view = which;
  document.getElementById('browse-view').classList.toggle('active', which==='browse');
  document.getElementById('graph-view').classList.toggle('active', which==='graph');
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.view-btn').forEach((b,i)=>{ if((i===0&&which==='browse')||(i===1&&which==='graph')) b.classList.add('active'); });
  if (which === 'graph' && !graphInitialized) initGraph();
}

// FORCE GRAPH
// ══════════════════════════════════════════════════════
let graphInitialized = false;
let simulation, svgSel, nodeGroup, linkGroup, labelGroup;

function buildGraphData() {
  const nodes = Object.values(ENTITIES).map(e=>({ id:e.id, name:e._name, type:e._type, ...e }));
  const links = [];
  const seen = new Set();
  Object.entries(RELS).forEach(([src, rels]) => {
    rels.forEach(r => {
      const key = [src,r.id].sort().join('--');
      if (!seen.has(key) && ENTITIES[src] && ENTITIES[r.id]) {
        seen.add(key);
        links.push({ source:src, target:r.id, label:r.label });
      }
    });
  });
  return { nodes, links };
}

function initGraph() {
  graphInitialized = true;
  const { nodes, links } = buildGraphData();
  const svg = d3.select('#graph-svg');
  const el = document.getElementById('graph-svg');
  const W = el.clientWidth || 800, H = el.clientHeight || 600;

  svg.selectAll('*').remove();
  const g = svg.append('g');

  svg.call(d3.zoom().scaleExtent([0.2,3]).on('zoom', e => g.attr('transform', e.transform)));

  // Edge lines
  linkGroup = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke', '#c8bfae').attr('stroke-width', 0.8).attr('stroke-opacity', 0.5);

  // Node circles
  nodeGroup = g.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', d => d.type==='pc' ? 13 : d.type==='quest' ? 11 : d.type==='combat' ? 10 : 9)
    .attr('fill', d => TYPE_HEX[d.type] || '#888')
    .attr('fill-opacity', 0.9)
    .attr('stroke', '#0f1020').attr('stroke-width', 1.5)
    .style('cursor','pointer')
    .on('mouseover', (e,d) => {
      const tt = document.getElementById('graph-tooltip');
      tt.textContent = d.name; tt.style.opacity='1';
      tt.style.left=(e.offsetX+12)+'px'; tt.style.top=(e.offsetY-8)+'px';
    })
    .on('mousemove', (e) => {
      const tt = document.getElementById('graph-tooltip');
      tt.style.left=(e.offsetX+12)+'px'; tt.style.top=(e.offsetY-8)+'px';
    })
    .on('mouseout', () => { document.getElementById('graph-tooltip').style.opacity='0'; })
    .on('click', (e,d) => { e.stopPropagation(); showNodePanel(d); })
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

  // Labels
  labelGroup = g.append('g').selectAll('text').data(nodes).join('text')
    .text(d => d.name.length > 14 ? d.name.slice(0,13)+'…' : d.name)
    .attr('font-size', '9px')
    .attr('font-family', 'Cinzel, serif')
    .attr('text-anchor','middle')
    .attr('dy', d => (d.type==='pc'?13:d.type==='quest'?11:10) + 10)
    .attr('fill', '#7d7a94')
    .style('pointer-events','none');

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(80).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-220))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide(22))
    .on('tick', () => {
      linkGroup.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeGroup.attr('cx',d=>d.x).attr('cy',d=>d.y);
      labelGroup.attr('x',d=>d.x).attr('y',d=>d.y);
    });

  // Legend
  document.getElementById('graph-legend').innerHTML = Object.entries(TYPE_HEX)
    .filter(([t])=>t!=='session')
    .map(([t,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${t}</div>`).join('');

  svg.on('click', () => document.getElementById('graph-node-panel').classList.remove('visible'));
}

function showNodePanel(d) {
  const panel = document.getElementById('graph-node-panel');
  const rels = (RELS[d.id]||[]).slice(0,6);
  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="width:10px;height:10px;border-radius:50%;background:${TYPE_HEX[d.type]};flex-shrink:0;display:inline-block;"></span>
      <div class="gnp-title">${d.name}</div>
    </div>
    <div class="gnp-type">${d.type}${d.cls?' · '+d.cls:d.status?' · '+d.status:''}</div>
    ${rels.length ? `<div style="font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;">Connections</div>
    <div class="gnp-rels">${rels.map(r=>`<div class="gnp-rel" onclick="showNodePanel(Object.values(ENTITIES).find(e=>e.id==='${r.id}'))"><span style="width:7px;height:7px;border-radius:50%;background:${TYPE_HEX[r.type]||'#888'};display:inline-block;flex-shrink:0;"></span><span class="gnp-rel-name">${getName(r.id)}</span><span style="font-size:0.72rem;color:var(--muted);margin-left:auto;">${r.label}</span></div>`).join('')}</div>` : ''}
    <button class="gnp-btn" onclick="selectEntity('${d.id}');switchView('browse')">View full record →</button>`;
  panel.classList.add('visible');
  highlightNode(d.id);
}

function highlightNode(id) {
  nodeGroup.attr('fill-opacity', d => {
    const rels = RELS[id]||[];
    return d.id===id || rels.some(r=>r.id===d.id) ? 1 : 0.25;
  }).attr('stroke-width', d=>d.id===id?3:1.5);
  linkGroup.attr('stroke-opacity', d => {
    const sid = typeof d.source==='object'?d.source.id:d.source;
    const tid = typeof d.target==='object'?d.target.id:d.target;
    return sid===id||tid===id ? 0.9 : 0.1;
  }).attr('stroke-width', d => {
    const sid = typeof d.source==='object'?d.source.id:d.source;
    const tid = typeof d.target==='object'?d.target.id:d.target;
    return sid===id||tid===id ? 2 : 0.8;
  });
}

function focusNode(id) {
  if (!graphInitialized) { initGraph(); setTimeout(()=>focusNode(id),600); return; }
  const d = Object.values(ENTITIES).find(e=>e.id===id);
  if (d) showNodePanel(d);
}

function resetGraph() {
  if (!graphInitialized) return;
  nodeGroup.attr('fill-opacity',0.9).attr('stroke-width',1.5);
  linkGroup.attr('stroke-opacity',0.5).attr('stroke-width',0.8);
  document.getElementById('graph-node-panel').classList.remove('visible');
  d3.select('#graph-svg').transition().duration(500).call(
    d3.zoom().transform, d3.zoomIdentity.translate(0,0).scale(1)
  );
}

function focusParty() {
  if (!graphInitialized) return;
  nodeGroup.attr('fill-opacity', d=>d.type==='pc'?1:0.2);
  linkGroup.attr('stroke-opacity', d=>{
    const s=typeof d.source==='object'?d.source.type:null;
    const t=typeof d.target==='object'?d.target.type:null;
    return s==='pc'||t==='pc'?0.8:0.1;
  });
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init() {
  setStatus('Loading campaign data…', 'loading');
  fetch('../data/magers-campaign.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(json) {
      DATA = normaliseCampaignJson(json);
      registerAll();
      renderSessionTimeline();
      renderSidebar();
      applyMode();
      setStatus(
        'Magers Campaign · ' + (DATA.sessions?.length||0) + ' sessions logged',
        'ok'
      );
    })
    .catch(function(e) {
      setStatus('Failed to load campaign data: ' + e.message, 'error');
      console.error('[Chronicle] data load failed:', e);
    });
}

init();
</script>
