<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Magers Campaign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #f0e8d0;
  --parchment: #0f1020;
  --amber: #d4af37;
  --amber-light: #f0d060;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cinzel', serif;
  background: var(--parchment);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ── Background image ── */
#bg-image {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
  filter: brightness(0.45) saturate(0.8);
}

/* ── Content card ── */
.card {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  padding: 3.5rem 4.5rem;
  background: rgba(10, 11, 30, 0.78);
  border: 1px solid rgba(212, 175, 55, 0.22);
  border-radius: 4px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

/* ── Title ── */
.title {
  font-size: 3rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: var(--ink);
  line-height: 1;
}
.title em {
  font-style: normal;
  color: rgba(212, 175, 55, 0.7);
}

/* ── Subtitle ── */
.subtitle {
  font-size: 0.68rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  font-variant: small-caps;
  color: rgba(240, 232, 208, 0.45);
  margin-top: -0.5rem;
}

/* ── Divider ── */
.divider {
  width: 100px;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.4), transparent);
}

/* ── CTA container ── */
.cta {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── Primary button ── */
.btn-enter {
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  background: #d4af37;
  color: #0f1020;
  border: none;
  padding: 0.9rem 3rem;
  border-radius: 3px;
  cursor: pointer;
  width: fit-content;
  transition: background 0.15s, transform 0.1s;
}
.btn-enter:hover  { background: #f0d060; transform: translateY(-1px); }
.btn-enter:active { transform: translateY(0); }

/* ── Secondary admin link ── */
.btn-admin {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(240, 232, 208, 0.35);
  background: none;
  border: none;
  cursor: pointer;
  margin-top: 1.25rem;
  transition: color 0.15s;
}
.btn-admin:hover { color: rgba(240, 232, 208, 0.7); }
</style>
</head>
<body>

<img id="bg-image" alt="">

<div class="card">
  <div class="title">Chron<em>i</em>cle</div>
  <div class="subtitle">Magers Campaign</div>
  <div class="divider"></div>
  <div class="cta">
    <button class="btn-enter" onclick="window.location='player/'">Enter Chronicle</button>
    <button class="btn-admin" onclick="window.location='admin/log-viewer.html'">Admin Access</button>
  </div>
</div>

<script>
  document.getElementById('bg-image').src = 'images/Netherees-Background.jpg';
</script>
</body>
</html>
