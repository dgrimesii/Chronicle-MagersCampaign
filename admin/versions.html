<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronicle — Version Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── Arcane Night ── */
  --ink:#f0e8d0; --ink-inv:#0f1020;
  --parchment:#0f1020; --parchment-dark:#13152b; --parchment-mid:#1e2040; --card-bg:#181a35;
  --amber:#d4af37; --amber-dim:#a88820; --amber-light:#f0d060;
  --rust:#ff6b50; --teal:#4a9e7a; --green:#4adf9a; --purple:#c090ff;
  --muted:#7d7a94; --muted-light:#4a4870;
  --border:rgba(212,175,55,0.12); --border-strong:rgba(212,175,55,0.28);
  --shadow:0 4px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.08);
  --shadow-md:0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.12);
  /* Entity colours — brightened for dark bg */
  --c-pc:#4adf9a; --c-npc:#ff8c55; --c-loc:#5ab0ff; --c-quest:#ffd040;
  --c-item:#c090ff; --c-combat:#ff6060; --c-lore:#80ff80; --c-session:#9090c0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Crimson Pro',Georgia,serif;background:#0f1020;color:#f0e8d0;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(74,59,140,0.25) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(30,20,80,0.4) 0%,transparent 55%);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse at 20% 10%,rgba(212,175,55,0.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(42,107,107,0.04) 0%,transparent 50%);}

header{border-bottom:1px solid var(--border-strong);padding:0 1.5rem;display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;height:64px;background:rgba(13,15,40,0.95);position:relative;z-index:100;}
.logo{font-family:"Cinzel",serif;font-size:1.05rem;font-weight:600;letter-spacing:0.12em;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logo span{color:var(--amber);}
.header-right{display:flex;justify-content:flex-end;align-items:center;gap:0.75rem;overflow:hidden;min-width:0;}
.nav-links{display:flex;gap:0.9rem;justify-content:center;align-items:center;flex-wrap:nowrap;padding:0 2rem;}
.nav-link{cursor:pointer;font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;padding-bottom:2px;border-bottom:1px solid transparent;transition:all 0.15s;white-space:nowrap;cursor:pointer;}
.nav-link:hover{color:var(--ink);}
.nav-link.active{color:var(--amber);border-bottom-color:var(--amber);}

.shell{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden;max-height:calc(100vh - 64px);}

/* ── Left panel: version ledger ── */
.ledger-panel{border-right:1px solid var(--border-strong);display:flex;flex-direction:column;background:#13152b;overflow:hidden;}
.ledger-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.ledger-title{font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.12em;font-weight:600;margin-bottom:0.25rem;}
.ledger-subtitle{font-size:0.8rem;color:var(--muted);font-style:italic;}
.ledger-list{flex:1;overflow-y:auto;}

/* Version entries in ledger */
.version-entry{padding:0.75rem 1.25rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;position:relative;}
.version-entry:hover{background:rgba(212,175,55,0.06);}
.version-entry.active{background:rgba(212,175,55,0.12);border-right:2px solid var(--amber);}
.version-entry.is-live{border-left:3px solid var(--teal);}
.version-entry.is-pre{border-left:3px solid var(--amber);}
.version-entry.is-post{border-left:3px solid var(--green);}
.version-entry.is-manual{border-left:3px solid var(--muted);}

.ve-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.ve-tag{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.12em;padding:2px 7px;border-radius:2px;text-transform:uppercase;flex-shrink:0;}
.tag-live{background:rgba(42,107,107,0.12);color:var(--teal);border:1px solid rgba(42,107,107,0.25);}
.tag-pre{background:rgba(212,175,55,0.1);color:var(--amber-dim);border:1px solid rgba(212,175,55,0.25);}
.tag-post{background:rgba(45,106,63,0.1);color:var(--green);border:1px solid rgba(45,106,63,0.25);}
.tag-manual{background:rgba(212,175,55,0.006);color:var(--muted);border:1px solid var(--border-strong);}
.ve-name{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--ink);font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ve-date{font-size:0.78rem;color:var(--muted-light);}
.ve-stats{display:flex;gap:8px;margin-top:2px;flex-wrap:wrap;}
.ve-stat{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--muted);}
.ve-note{font-size:0.78rem;color:var(--muted);font-style:italic;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.ledger-empty{padding:2rem 1.25rem;text-align:center;color:var(--muted);}
.ledger-empty-title{font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.08em;margin-bottom:0.4rem;}
.ledger-empty-hint{font-size:0.88rem;font-style:italic;}

/* ── Right panel: actions + detail ── */
.action-panel{display:flex;flex-direction:column;overflow:hidden;}

/* Action bar at top */
.action-bar{padding:1rem 1.75rem;border-bottom:1px solid var(--border);background:var(--card-bg);display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.action-bar-title{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.12em;color:var(--muted);margin-right:4px;}

/* Main content area */
.content-area{flex:1;overflow-y:auto;padding:1.75rem;}

/* Live file card */
.live-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow);}
.live-card-header{background:var(--ink);color:var(--parchment);padding:0.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;}
.live-card-title{font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.1em;}
.live-status-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse-green 2s infinite;}
@keyframes pulse-green{0%,100%{opacity:1;}50%{opacity:0.5;}}
.live-card-body{padding:1.25rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;}
.live-stat{text-align:center;padding:0.75rem;background:var(--parchment-mid);border-radius:3px;}
.live-stat-num{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:600;color:var(--ink);}
.live-stat-label{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-top:2px;}
.live-card-footer{padding:0.75rem 1.25rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--parchment);}
.live-file-name{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--muted);}

/* Pre-session backup workflow card */
.workflow-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow);}
.workflow-header{padding:0.85rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.workflow-header-title{font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.08em;font-weight:600;}
.workflow-badge{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.12em;padding:2px 9px;border-radius:2px;background:rgba(212,175,55,0.1);color:var(--amber-dim);border:1px solid rgba(212,175,55,0.25);}
.workflow-steps{display:flex;flex-direction:column;gap:0;}
.workflow-step{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:12px;padding:0.85rem 1.25rem;border-bottom:1px solid var(--border);}
.workflow-step:last-child{border-bottom:none;}
.workflow-step.done .step-circle{background:var(--teal);border-color:var(--teal);color:white;}
.workflow-step.current .step-circle{background:var(--amber);border-color:var(--amber);color:white;}
.step-circle{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:0.68rem;color:var(--muted);flex-shrink:0;}
.step-text-title{font-size:0.95rem;font-weight:600;color:var(--ink);}
.step-text-hint{font-size:0.8rem;color:var(--muted);font-style:italic;}

/* Version detail card */
.version-detail-card{background:var(--card-bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;box-shadow:var(--shadow);}
.vd-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
.vd-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;letter-spacing:0.06em;}
.vd-date{font-size:0.85rem;color:var(--muted);margin-top:3px;}
.vd-body{padding:1.25rem;}
.vd-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1.25rem;}
.vd-stat{text-align:center;padding:0.6rem;background:var(--parchment-mid);border-radius:3px;border:1px solid var(--border);}
.vd-stat-num{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:500;color:var(--ink);}
.vd-stat-label{font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-top:2px;}
.vd-diff{margin-bottom:1.25rem;}
.diff-title{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:0.5rem;}
.diff-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.9rem;}
.diff-row:last-child{border-bottom:none;}
.diff-field{min-width:120px;color:var(--muted);}
.diff-before{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--muted);text-decoration:line-through;}
.diff-arrow{color:var(--muted-light);}
.diff-after{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--teal);font-weight:500;}
.diff-unchanged{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--muted-light);}
.vd-note-input{width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:3px;font-family:'Crimson Pro',serif;font-size:0.95rem;background:var(--card-bg);color:var(--ink);outline:none;margin-top:4px;}
.vd-note-input:focus{border-color:var(--amber);}

/* Restore flow */
.restore-steps{background:rgba(42,107,107,0.04);border:1px solid rgba(42,107,107,0.2);border-radius:4px;padding:1rem 1.25rem;margin-top:1rem;}
.restore-step-row{display:flex;align-items:flex-start;gap:10px;padding:5px 0;font-size:0.92rem;}
.restore-step-num{font-family:'Cinzel',serif;font-size:0.65rem;color:var(--teal);min-width:18px;margin-top:2px;}
.danger-zone{background:rgba(139,58,30,0.04);border:1px solid rgba(139,58,30,0.2);border-radius:4px;padding:1rem 1.25rem;margin-top:1rem;}
.danger-title{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.15em;color:var(--rust);text-transform:uppercase;margin-bottom:0.5rem;}

/* Import drop zone */
.import-zone{border:1.5px dashed var(--border-strong);border-radius:4px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;background:rgba(212,175,55,0.04);position:relative;margin-bottom:1.5rem;}
.import-zone:hover,.import-zone.drag-over{border-color:var(--amber);background:rgba(212,175,55,0.04);}
.import-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.import-zone-label{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.1em;color:var(--muted);margin-top:6px;}
.import-zone-hint{font-size:0.85rem;color:var(--muted-light);font-style:italic;margin-top:3px;}

/* Buttons */
.btn{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.1em;padding:8px 16px;border-radius:3px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
.btn-primary{background:var(--amber);color:white;border-color:var(--amber-dim);}
.btn-primary:hover{background:var(--amber-dim);}
.btn-teal{background:var(--teal);color:white;border-color:var(--teal);}
.btn-teal:hover{background:#205555;}
.btn-danger{background:rgba(139,58,30,0.1);color:var(--rust);border-color:rgba(139,58,30,0.3);}
.btn-danger:hover{background:var(--rust);color:white;border-color:var(--rust);}
.btn-secondary{background:transparent;color:var(--ink);border-color:var(--border-strong);}
.btn-secondary:hover{background:var(--parchment-dark);}
.btn-ghost{background:none;border:none;font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.08em;color:var(--amber-dim);cursor:pointer;padding:4px 0;text-decoration:underline;text-underline-offset:3px;}
.btn-sm{padding:5px 11px;font-size:0.64rem;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Divider */
.ornament-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;}
.ornament-divider::before,.ornament-divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border-strong),transparent);}
.ornament-divider span{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;white-space:nowrap;}

/* Toast */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:var(--parchment);padding:0.75rem 1.25rem;border-radius:4px;font-size:0.9rem;opacity:0;transform:translateY(8px);transition:all 0.25s;z-index:999;pointer-events:none;font-family:'Crimson Pro',serif;}
.toast.show{opacity:1;transform:translateY(0);}

/* Confirm modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(212,175,55,0.05);z-index:500;display:flex;align-items:center;justify-content:center;padding:2rem;}
.modal-backdrop.hidden{display:none;}
.modal{background:var(--parchment);border:1px solid var(--border-strong);border-radius:4px;width:100%;max-width:440px;box-shadow:var(--shadow-md);}
.modal-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:0.88rem;letter-spacing:0.08em;}
.modal-body{padding:1.25rem;font-size:0.95rem;line-height:1.65;}
.modal-footer{padding:0.85rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
</style>
</head>

<script>
// ── Drive integration ─────────────────────────────────────────────────────────
// All requests use GET to avoid CORS preflight. Write data is JSON-encoded
// in the URL 'payload' parameter. The proxy returns { ok, raw } for reads
// and { ok, ... } for mutations.

const DRIVE_PROXY    = window.CHRONICLE_CONFIG.proxyUrl;
// Use the resolver so Drive writes target the test Drive file when safeTestMode is on.
const CAMPAIGN_FILE  = window.CHRONICLE_CONFIG.getCampaignFileId();

async function driveGet(params) {
  var url = DRIVE_PROXY + '?';
  var parts = [];
  Object.keys(params).forEach(function(k) {
    parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
  });
  url += parts.join('&');
  const res  = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Drive error');
  return data;
}

// Read campaign JSON — returns the parsed campaign object
async function fetchCampaignFromDrive() {
  const data = await driveGet({ action: 'read', id: CAMPAIGN_FILE });
  // Proxy returns { ok: true, raw: "<json string>" }
  return JSON.parse(data.raw);
}

// Write uses POST with Content-Type: text/plain to avoid CORS preflight.
// text/plain is a CORS "simple" type — no OPTIONS request is sent.
async function writeCampaignToDrive(campaignObj) {
  const body = JSON.stringify({ action: 'write', fileId: CAMPAIGN_FILE, data: campaignObj });
  const res  = await fetch(DRIVE_PROXY, {
    method:  'POST',
    headers: { 'Content-Type': 'text/plain' },
    body:    body,
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Drive write error');
  return data;
}


// Create a backup copy
async function backupCampaignOnDrive(label) {
  return driveGet({
    action: 'backup',
    id:     CAMPAIGN_FILE,
    label:  label || '',
  });
}

// List existing backups
async function listDriveBackups() {
  return driveGet({ action: 'listBackups', id: CAMPAIGN_FILE });
}

// Compatibility shim — routes write to POST, everything else to GET
async function driveRequest(action, extra) {
  if (action === 'write') {
    const data = (extra || {}).data;
    if (!data) throw new Error('driveRequest write: data required');
    return writeCampaignToDrive(data);
  }
  var params = Object.assign({ action: action, id: CAMPAIGN_FILE }, extra || {});
  return driveGet(params);
}


// ══════════════════════════════════════════════════════
// VERSION LEDGER — persisted to localStorage
// Each entry:
// {
//   id: string (timestamp),
//   type: 'pre' | 'post' | 'manual' | 'live',
//   filename: string,
//   label: string,
//   sessionRef: string,  // e.g. 'session_006'
//   createdAt: ISO string,
//   note: string,
//   stats: { sessions, pcs, npcs, quests, combats, rounds, items },
//   dataSnapshot: object | null  // stored if size < 2MB, else null
// }
// ══════════════════════════════════════════════════════

const LEDGER_KEY = 'chronicle_version_ledger';
const LIVE_KEY   = 'chronicle_live_data';

let ledger = JSON.parse(localStorage.getItem(LEDGER_KEY) || '[]');

function setVersionStatus(msg, state) {
  const el = document.getElementById('version-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = state === 'ok' ? 'var(--green)' : state === 'error' ? 'var(--red)' : 'var(--amber)';
}

// Sync Drive backup list into the local ledger (adds any Drive backups not already recorded)
async function syncBackupsFromDrive() {
  try {
    setVersionStatus('Syncing backup list from Drive…', 'loading');
    const result  = await driveRequest('listBackups', {});
    const backups = result.backups || [];

    let added = 0;
    for (const b of backups) {
      if (ledger.some(e => e.driveBackupId === b.id)) continue; // already in ledger
      const guessed = guessType(b.name);
      ledger.push({
        id:             generateId(),
        type:           guessed,
        filename:       b.name,
        label:          labelFromFilename(b.name),
        sessionRef:     guessSessionRef(b.name),
        createdAt:      b.modified,
        note:           `Imported from Drive: ${b.name}`,
        stats:          null,
        driveBackupId:  b.id,
        driveBackupName:b.name,
        dataSnapshot:   null,
      });
      added++;
    }

    ledger.sort((a, b) => b.createdAt.localeCompare(a.createdAt));
    saveLedger();
    render();
    setVersionStatus(added > 0 ? `✓ Synced ${added} backup${added!==1?'s':''} from Drive` : '✓ Ledger up to date', 'ok');
  } catch(e) {
    setVersionStatus(`Sync failed: ${e.message}`, 'error');
  }
}

// Restore: download a Drive backup file to the user's machine
async function downloadDriveBackup(driveBackupId, filename) {
  try {
    setVersionStatus('Fetching backup from Drive…', 'loading');
    const res  = await fetch(`${DRIVE_PROXY}?id=${driveBackupId}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    const blob = new Blob([JSON.stringify(data.data, null, 2)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a'); a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    setVersionStatus(`✓ Downloaded: ${filename}`, 'ok');
  } catch(e) {
    setVersionStatus(`Download failed: ${e.message}`, 'error');
  }
}

// ══════════════════════════════════════════════════════
// VERSIONING LOGIC
// ══════════════════════════════════════════════════════
function computeDiff(vStats, liveStats) {
  const fields = { Sessions:'sessions', NPCs:'npcs', Quests:'quests', Combats:'combats', Rounds:'rounds', Items:'items' };
  return Object.entries(fields)
    .filter(([,k])=> (vStats[k]??0) !== (liveStats[k]??0))
    .map(([label,k])=>({ field:label, before:vStats[k]??0, after:liveStats[k]??0, delta:(liveStats[k]??0)-(vStats[k]??0) }));
}

function statsFromData(data) {
  const rounds = (data.combats||data.combat_encounters||[]).reduce((sum,c)=>sum+(c.rounds?.length||c.totalRounds||0),0);
  return {
    sessions: (data.sessions||data.session_logs||[]).length,
    pcs: (data.party||[]).length,
    npcs: (data.npcs||data.npc_directory||[]).length,
    quests: (data.quests||data.quest_ledger||[]).length,
    combats: (data.combats||data.combat_encounters||[]).length,
    rounds,
    items: (data.items||data.inventory_and_loot||[]).length,
  };
}

function nextSessionLabel() {
  const live = ledger.find(v=>v.type==='live');
  const n = live ? (live.stats.sessions + 1) : 1;
  return `session_${String(n).padStart(3,'0')}`;
}

function generateId() { return 'v' + Date.now(); }

function formatFilename(type, sessionRef) {
  const sid = sessionRef || nextSessionLabel();
  const map = {
    pre:  `magers-campaign_pre-${sid}.json`,
    post: `magers-campaign_v${sid.replace('session_','')}.json`,
    manual: `magers-campaign_manual-${new Date().toISOString().slice(0,10)}.json`,
    live: 'magers-campaign.json',
  };
  return map[type] || `magers-campaign_${type}.json`;
}

// ── Pre-session backup ──
async function startPreSessionBackup() {
  const btn = document.getElementById('pre-backup-btn');
  if (btn) { btn.textContent = 'Creating backup…'; btn.disabled = true; }

  try {
    const sessionRef = nextSessionLabel();
    const label      = `pre-${sessionRef}`;

    // Step 1 — backup file on Drive (server-side copy, stays in campaign folder)
    setVersionStatus('Creating Drive backup…', 'loading');
    const result = await driveRequest('backup', { label });
    const driveBackupId   = result.backupId;
    const driveBackupName = result.name;

    // Step 2 — fetch current campaign data to store stats locally
    setVersionStatus('Reading campaign data…', 'loading');
    const data  = await fetchCampaignFromDrive();
    const stats = statsFromData(data);

    // Step 3 — record in local ledger
    const entry = {
      id:           generateId(),
      type:         'pre',
      filename:     driveBackupName,
      label:        `Pre-${sessionRef.replace('_','-')}`,
      sessionRef,
      createdAt:    new Date().toISOString(),
      note:         `Automatic pre-session backup before ${sessionRef}. Drive copy: ${driveBackupName}`,
      stats,
      driveBackupId,
      driveBackupName,
      dataSnapshot: null,
    };

    ledger.unshift(entry);
    saveLedger();
    selectedId = entry.id;
    render();

    setVersionStatus(`✓ Backup created: ${driveBackupName}`, 'ok');
    showToast(`Drive backup created: ${driveBackupName}`);

  } catch(e) {
    setVersionStatus(`Backup failed: ${e.message}`, 'error');
    showToast(`Backup failed: ${e.message}`);
  } finally {
    if (btn) { btn.textContent = 'Pre-session backup'; btn.disabled = false; }
  }
}

// ── Import a JSON file into the ledger ──
function importJsonFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const stats = statsFromData(data);
      const type = guessType(file.name);
      const sessionRef = guessSessionRef(file.name, data);

      const entry = {
        id: generateId(),
        type,
        filename: file.name,
        label: labelFromFilename(file.name),
        sessionRef,
        createdAt: new Date().toISOString(),
        note: '',
        stats,
        dataSnapshot: file.size < 2_000_000 ? data : null,
      };

      ledger.unshift(entry);
      saveLedger();
      selectedId = entry.id;
      render();
      showToast(`Imported: ${file.name} (${stats.sessions} sessions, ${stats.rounds} rounds)`);
    } catch(err) {
      showToast('Could not parse JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function guessType(filename) {
  if (filename.includes('_pre-')) return 'pre';
  if (/_v\d{3}/.test(filename)) return 'post';
  if (filename === 'magers-campaign.json') return 'live';
  return 'manual';
}

function guessSessionRef(filename, data) {
  const m = filename.match(/session[_-](\d{3})/i);
  if (m) return `session_${m[1]}`;
  const sessions = data.sessions || data.session_logs || [];
  return sessions.length ? sessions[sessions.length-1].id || sessions[sessions.length-1].session_id || '' : '';
}

function labelFromFilename(filename) {
  return filename
    .replace('magers-campaign_','')
    .replace('.json','')
    .replace(/-/g,' ')
    .replace(/\b\w/g, c=>c.toUpperCase());
}

// ── Download helpers ──
function downloadVersionEntry(entry, overrideName) {
  // In production, entry.dataSnapshot holds the actual data
  // Here we create a placeholder with the stats embedded
  const content = JSON.stringify({
    _chronicle_version: true,
    _version_id: entry.id,
    _label: entry.label,
    _created_at: entry.createdAt,
    _session_ref: entry.sessionRef,
    _type: entry.type,
    _stats: entry.stats,
    _note: 'This is a demo download. In production, this file contains the full campaign JSON.',
    _restore_instructions: 'Upload this file to Google Drive as magers-campaign.json to restore.',
  }, null, 2);

  const blob = new Blob([content], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = overrideName || entry.filename;
  a.click();
  URL.revokeObjectURL(url);
}

function downloadVersion(id) {
  const v = ledger.find(e=>e.id===id);
  if (v) downloadVersionEntry(v, v.filename);
}

function downloadForRestore(id) {
  const v = ledger.find(e=>e.id===id);
  if (v) downloadVersionEntry(v, 'magers-campaign.json');
  showToast('Downloaded as magers-campaign.json — upload to Drive to restore');
}

// ── Update note ──
function updateNote(id, note) {
  const v = ledger.find(e=>e.id===id);
  if (v && v.note !== note) { v.note = note; saveLedger(); renderLedger(); }
}

// ── Mark as live ──
function markAsLive(id) {
  showModal(
    'Mark as live?',
    'This will update the ledger to treat this version as the current live file. It does not modify Google Drive. Use this to sync the ledger with your actual Drive state.',
    'Mark as live',
    () => {
      ledger.forEach(v=>{ if(v.type==='live') v.type='post'; });
      const v = ledger.find(e=>e.id===id);
      if (v) { v.type='live'; v.filename='magers-campaign.json'; }
      saveLedger();
      render();
      showToast('Ledger updated — marked as live');
    }
  );
}

// ── Delete ──
function deleteVersion(id) {
  const v = ledger.find(e=>e.id===id);
  showModal(
    `Remove "${v?.label}"?`,
    'This removes it from the local ledger only. The actual file on Google Drive is not affected.',
    'Remove',
    () => {
      ledger = ledger.filter(e=>e.id!==id);
      if (selectedId===id) selectedId=null;
      saveLedger();
      render();
      showToast('Removed from ledger');
    }
  );
}

// ── Select ──
function selectVersion(id) {
  selectedId = selectedId===id ? null : id;
  render();
}

// ── Clear all ──
function clearLedger() {
  showModal('Clear entire ledger?','This removes all entries from the local ledger. Files on Google Drive are not affected.','Clear all',()=>{
    ledger=[]; selectedId=null; saveLedger(); render(); showToast('Ledger cleared');
  });
}

function triggerImport() { document.getElementById('import-file-input').click(); }

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
let pendingConfirm = null;
function showModal(title, body, confirmLabel, onConfirm) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-confirm-btn').textContent = confirmLabel;
  pendingConfirm = onConfirm;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); pendingConfirm=null; }
document.getElementById('modal-confirm-btn').onclick = ()=>{ if(pendingConfirm){pendingConfirm();closeModal();} };

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ══════════════════════════════════════════════════════
// POST-SESSION AUTO-RECORD (called from Delta Review after publish)
// ══════════════════════════════════════════════════════
window.chronicleRecordPostSession = function(sessionId, stats, note) {
  const entry = {
    id: generateId(),
    type: 'post',
    filename: formatFilename('post', sessionId),
    label: `Post-${sessionId.replace('_','-')}`,
    sessionRef: sessionId,
    createdAt: new Date().toISOString(),
    note: note || `Automatically recorded after ${sessionId} delta review.`,
    stats,
    dataSnapshot: null,
  };
  // Update live entry to post
  ledger.forEach(v=>{ if(v.type==='live') v.type='post'; });
  // Add new live entry
  const liveEntry = { ...entry, id: generateId()+'_live', type:'live', filename:'magers-campaign.json', label:'Live file' };
  ledger.unshift(liveEntry);
  ledger.unshift(entry);
  saveLedger();
  render();
};

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
render();
</script>
